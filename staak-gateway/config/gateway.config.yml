http:
  port: ${PORT}
  host: ${HOST}
apiEndpoints:
  users:
    host: '*'
    paths: ['/api/users/*']
  jobs:
    host: '*'
    paths: ['/api/jobs/*']
  metadata:
    host: '*'
    paths: ['/api/metadata/*']
  cdn:
    host: '*'
    paths: ['/cdn/*']
serviceEndpoints:
  jobs:
    url: 'http://localhost:3001'
  users:
    url: 'http://localhost:3002'
  metadata:
    url: 'http://localhost:3003'
  cdn:
    url: 'http://localhost:3004'
policies:
  - basic-auth
  - cors
  - expression
  - key-auth
  - auth
  - proxy
  - rate-limit

pipelines:
  cdn:
    apiEndpoints:
      - cdn
    policies:
      - cors:
          - action:
              origin: '*'
      - proxy:
          - action:
              serviceEndpoint: cdn
              changeOrigin: true
  users:
    apiEndpoints:
      - users
    policies:
      - cors:
          - action:
              origin: '*'
      - auth:
      - proxy:
          - action:
              serviceEndpoint: users
              changeOrigin: true
  jobs:
    apiEndpoints:
      - jobs
    policies:
      - cors:
          - action:
              origin: '*'
      - auth:
      - proxy:
          - action:
              serviceEndpoint: jobs
              changeOrigin: true
  metadata:
    apiEndpoints:
      - metadata
    policies:
      - cors:
          - action:
              origin: '*'
      - auth:
      - proxy:
          - action:
              serviceEndpoint: metadata
              changeOrigin: true
