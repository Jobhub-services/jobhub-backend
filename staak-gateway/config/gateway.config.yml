http:
  port: ${PORT}
  host: ${HOST}
apiEndpoints:
  users:
    host: '*'
    paths: ['/api/users', '/api/users/*']
  jobs:
    host: '*'
    paths: ['/api/jobs', '/api/jobs/*']
  metadata:
    host: '*'
    paths: ['/api/metadata', '/api/metadata/*']
  cdn:
    host: '*'
    paths: ['/cdn/*']
  notifications:
    host: '*'
    paths: ['/api/notifications', '/api/notifications/*']
  payments:
    host: '*'
    paths: ['/api/payments', '/api/payments/*']
serviceEndpoints:
  jobs:
    url: 'http://localhost:3001'
  users:
    url: 'http://localhost:3002'
  metadata:
    url: 'http://localhost:3003'
  cdn:
    url: 'http://localhost:3004'
  notifications:
    url: 'http://localhost:3006'
  payments:
    url: 'http://localhost:3008'
policies:
  - basic-auth
  - cors
  - expression
  - key-auth
  - auth
  - proxy
  - rate-limit

pipelines:
  cdn:
    apiEndpoints:
      - cdn
    policies:
      - cors:
          - action:
              origin: '*'
      - proxy:
          - action:
              serviceEndpoint: cdn
              changeOrigin: true
  notifications:
    apiEndpoints:
      - notifications
    policies:
      - cors:
          - action:
              origin: '*'
      - proxy:
          - action:
              serviceEndpoint: notifications
              changeOrigin: true
  users:
    apiEndpoints:
      - users
    policies:
      - cors:
          - action:
              origin: '*'
      - auth:
      - proxy:
          - action:
              serviceEndpoint: users
              changeOrigin: true
  jobs:
    apiEndpoints:
      - jobs
    policies:
      - cors:
          - action:
              origin: '*'
      - auth:
      - proxy:
          - action:
              serviceEndpoint: jobs
              changeOrigin: true
  metadata:
    apiEndpoints:
      - metadata
    policies:
      - cors:
          - action:
              origin: '*'
      - auth:
      - proxy:
          - action:
              serviceEndpoint: metadata
              changeOrigin: true
  payments:
    apiEndpoints:
      - payments
    policies:
      - cors:
          - action:
              origin: '*'
      - auth:
      - proxy:
          - action:
              serviceEndpoint: payments
              changeOrigin: true
