http:
  port: ${PORT}
  host: ${HOST}
apiEndpoints:
  users:
    host: '*'
    paths: ['/api/users/*']
  jobs:
    host: '*'
    paths: ['/api/jobs/*']
serviceEndpoints:
  users:
    url: 'http://localhost:3002'
  jobs:
    url: 'http://localhost:3001'
policies:
  - basic-auth
  - cors
  - expression
  - key-auth
  - proxy
  - rate-limit
pipelines:
  users:
    apiEndpoints:
      - users
    policies:
      - proxy:
          - action:
              serviceEndpoint: users
              changeOrigin: true
  jobs:
    apiEndpoints:
      - jobs
    policies:
      - proxy:
          - action:
              serviceEndpoint: jobs
              changeOrigin: true
